<!DOCTYPE html>
<html lang="hu" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Marveen Dashboard</title>
    <script>
      // Block-render theme bootstrap to avoid FOUC. Mirrors the logic in
      // src/lib/theme.ts so the very first paint already has the right
      // tokens. Keep these two in sync.
      ;(function () {
        try {
          var KEY = 'marveen-theme'
          var LEGACY = 'cc-theme'
          var saved = localStorage.getItem(KEY) || localStorage.getItem(LEGACY)
          var theme =
            saved === 'dark' || saved === 'light'
              ? saved
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {}
      })()
    </script>
    <script type="module" crossorigin src="/assets/index-DudklB7W.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BgjBkKEI.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
